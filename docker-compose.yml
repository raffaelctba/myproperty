  # Kafka UI (Optional - for development/monitoring)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: myproperty-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    networks:
      - myproperty-network
    profiles:
      - dev
    restart: unless-stopped

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: myproperty-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@myproperty.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    depends_on:
      - postgres
    ports:
      - "8082:80"
    networks:
      - myproperty-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - dev
    restart: unless-stopped

  # Redis Commander (Optional - for Redis management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: myproperty-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_password
    depends_on:
      - redis
    ports:
      - "8084:8081"
    networks:
      - myproperty-network
    profiles:
      - dev
    restart: unless-stopped

# Networks
networks:
  myproperty-network:
    driver: bridge
    name: myproperty-network

# Volumes
volumes:
  postgres_data:
    name: myproperty_postgres_data
  redis_data:
    name: myproperty_redis_data
  kafka_data:
    name: myproperty_kafka_data
  keycloak_data:
    name: myproperty_keycloak_data
  backend_logs:
    name: myproperty_backend_logs
  backend_uploads:
    name: myproperty_backend_uploads
  pgadmin_data:
    name: myproperty_pgadmin_data